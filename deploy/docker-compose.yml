services:
  postgres:
    image: postgres:16-alpine
    container_name: rotom-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rotom_agent}
      POSTGRES_USER: ${POSTGRES_USER:-ALPHA}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rotom_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rotom-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-ALPHA}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-rotom_dev_password}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    container_name: rotom-backend
    env_file:
      - ../backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ../storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: ../backend
    container_name: rotom-worker
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      HOST_WORKSPACE_ROOT: ${HOST_WORKSPACE_ROOT:-${PWD}/storage/workspaces}
    command: python worker.py
    volumes:
      - ../storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:
